services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-chiper}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chiper-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  logistica:
    build:
      context: .
      dockerfile: apps/logistica/Dockerfile
    restart: unless-stopped
    ports:
      - "${LOGISTICA_PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-chiper}
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chiper-network

  inventario:
    build:
      context: .
      dockerfile: apps/inventario/Dockerfile
    restart: unless-stopped
    ports:
      - "${INVENTARIO_PORT:-3002}:3002"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-chiper}
      LOGISTICA_BASE_URL: http://logistica:3001
      PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      logistica:
        condition: service_started
    networks:
      - chiper-network

  ventas:
    build:
      context: .
      dockerfile: apps/ventas/Dockerfile
    restart: unless-stopped
    ports:
      - "${VENTAS_PORT:-3003}:3003"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-chiper}
      LOGISTICA_BASE_URL: http://logistica:3001
      PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
      logistica:
        condition: service_started
    networks:
      - chiper-network

volumes:
  postgres_data:
    driver: local

networks:
  chiper-network:
    driver: bridge
